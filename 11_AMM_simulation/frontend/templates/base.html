<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AMM 仿真系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/static/js/echarts.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">AMM 仿真系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">概览</a></li>
                    <li class="nav-item"><a class="nav-link" href="/trade">交易</a></li>
                    <li class="nav-item"><a class="nav-link" href="/liquidity">流动性</a></li>
                    <li class="nav-item"><a class="nav-link" href="/simulation">仿真控制</a></li>
                </ul>
                <span class="navbar-text me-3">步数: <strong id="nav-step">0</strong></span>
                <button class="btn btn-outline-light btn-sm" onclick="resetSystem()" title="恢复初始状态">重置</button>
            </div>
        </div>
    </nav>

    <main class="container-fluid mt-3 mb-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-2 bg-light text-muted small">
        DeFi AMM 核心逻辑仿真系统 &copy; 2026
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
    <script>
        async function updateNavStatus() {
            try {
                const res = await fetch('/api/sim/status');
                const data = await res.json();
                document.getElementById('nav-step').textContent = `${data.step}/${data.max_steps}`;
            } catch(e) {}
        }
        async function resetSystem() {
            if (!confirm('确认重置？将清空所有数据并恢复到初始状态。')) return;
            try {
                const res = await fetch('/api/sim/full-reset', {method:'POST'});
                if (res.ok) {
                    updateNavStatus();
                    location.reload();
                }
            } catch(e) {}
        }
        updateNavStatus();
        setInterval(updateNavStatus, 3000);
    </script>
</body>
</html>
